<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 热爱技术的小牛发布台</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">牛</div>
    <h1>发布台登录</h1>
    <p class="auth-sub">热爱技术的小牛 · 文章发布管理</p>
    <form id="login-form">
      <input type="password" id="password" placeholder="输入登录密码" autocomplete="current-password" required />
      <button type="submit">登录</button>
      <p id="err" class="err-msg" hidden></p>
    </form>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.hidden = true;
      const password = document.getElementById('password').value;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await r.json();
        if (r.ok) {
          location.href = '/editor.html';
        } else {
          err.textContent = data.error || '登录失败';
          err.hidden = false;
        }
      } catch (e) {
        err.textContent = '网络错误';
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
